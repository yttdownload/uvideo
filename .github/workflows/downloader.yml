name: "🎬 دانلودر پیشرفته یوتیوب - نسخه اختصاصی"

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: '🔗 لینک ویدیو (لینک‌ها را با فاصله یا کاما جدا کن)'
        required: true
        type: string
      download_subtitles:
        description: '📝 دانلود زیرنویس (فارسی و انگلیسی)'
        required: false
        default: false
        type: boolean
      quality:
        description: '🎬 کیفیت مورد نظر'
        required: false
        default: 'best'
        type: choice
        options:
          - best
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - audio
      password:
        description: '🔒 رمز فایل ZIP (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  downloader:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read  # فقط خواندن، برای امنیت بیشتر

    steps:
      - name: بررسی کد (Checkout)
        uses: actions/checkout@v4

      - name: ⚙️ راه‌اندازی پروکسی WARP (برای دور زدن محدودیت)
        run: |
          echo "Starting Cloudflare WARP container..."

          docker network create warp-net || true

          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp

          echo "Waiting for WARP to initialize (15 seconds)..."
          sleep 15

          echo "Checking WARP status..."
          for i in {1..5}; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "✅ WARP is active!"
              echo "$RESULT"
              break
            else
              echo "Attempt $i/5 - WARP not ready yet, waiting..."
              sleep 5
            fi
          done

      - name: 📦 نصب پیش‌نیازها (yt-dlp, ffmpeg, deno)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip p7zip-full curl jq bc unzip

          # نصب Deno که برای حل چالش‌های یوتیوب لازمه
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          deno --version

          pip3 install --upgrade yt-dlp

      - name: 🎯 آماده‌سازی متغیرها و پوشه‌ها
        env:
          YT_URLS: ${{ github.event.inputs.video_urls }}
          YT_QUALITY: ${{ github.event.inputs.quality }}
          YT_PASSWORD: ${{ github.event.inputs.password }}
          DOWNLOAD_SUBS: ${{ github.event.inputs.download_subtitles }}
        run: |
          # ── جدا کردن لینک‌ها (با جداکننده فاصله یا کاما) ──
          URLS_RAW="${YT_URLS}"
          URLS_RAW=$(echo "$URLS_RAW" | tr ',' ' ')
          read -ra URL_LIST <<< "$URLS_RAW"
          TOTAL_URLS=${#URL_LIST[@]}

          QUALITY="${YT_QUALITY}"
          ZIP_PASSWORD="${YT_PASSWORD}"

          # برای مدیریت فایل‌های بزرگ (زیر 50 مگابایت برای قانون گیت‌هاب)
          SPLIT_MB=45
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))

          # پوشه موقت برای بکاپ قبل از آپلود
          BACKUP_DIR="/tmp/video_backup_$$"
          mkdir -p "$BACKUP_DIR"
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt

          mkdir -p videos
          > /tmp/video_info.txt

          echo "🎬 YouTube Advanced Downloader"
          echo "======================================"
          echo "Total URLs to download: $TOTAL_URLS"
          echo "Quality: $QUALITY"
          if [ -n "$ZIP_PASSWORD" ]; then
            echo "Password protection: ENABLED"
          else
            echo "Password protection: DISABLED"
          fi
          if [ "$DOWNLOAD_SUBS" = "true" ]; then
            echo "Subtitles: ENABLED (en, fa)"
          else
            echo "Subtitles: DISABLED"
          fi
          echo "======================================"

          sanitize_name() {
            echo "$1" | sed 's/ /-/g' | sed 's/　/-/g' | tr -s '-'
          }

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          # ── تعیین کیفیت با فرمت yt-dlp ──
          case "$QUALITY" in
            "audio")
              FORMAT="bestaudio/bestaudio*/best"
              ;;
            "best")
              FORMAT="bestvideo+bestaudio/best"
              ;;
            "2160")
              FORMAT="bestvideo[height<=2160]+bestaudio/best"
              ;;
            "1440")
              FORMAT="bestvideo[height<=1440]+bestaudio/best"
              ;;
            "1080")
              FORMAT="bestvideo[height<=1080]+bestaudio/best"
              ;;
            "720")
              FORMAT="bestvideo[height<=720]+bestaudio/best"
              ;;
            "480")
              FORMAT="bestvideo[height<=480]+bestaudio/best"
              ;;
            *)
              FORMAT="bestvideo+bestaudio/best"
              ;;
          esac

          echo "$FORMAT" > /tmp/yt_format.txt
          echo "$QUALITY" > /tmp/yt_quality.txt
          echo "$ZIP_PASSWORD" > /tmp/yt_password.txt
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt
          # Save URL list (newline separated)
          printf "%s\n" "${URL_LIST[@]}" > /tmp/yt_urls.txt

      - name: 🎬 دانلود ویدیوها با ۸ روش مختلف
        run: |
          FORMAT=$(cat /tmp/yt_format.txt)
          QUALITY=$(cat /tmp/yt_quality.txt)
          ZIP_PASSWORD=$(cat /tmp/yt_password.txt)
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          SPLIT_MB=45
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))
          mapfile -t URL_LIST < /tmp/yt_urls.txt
          TOTAL_URLS=${#URL_LIST[@]}

          sanitize_name() {
            echo "$1" | sed 's/ /-/g' | sed 's/　/-/g' | tr -s '-'
          }

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          get_random_word() {
            RANDOM_WORDS=("alpha" "beta" "gamma" "delta" "epsilon" "zeta" "theta" "kappa" "lambda" "sigma" "omega" "nova" "star" "moon" "sun" "sky" "cloud" "river" "ocean" "mountain")
            echo "${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}_$RANDOM"
          }

          get_unique_folder() {
            local BASE_PATH="$1"
            local NAME="$2"
            if [ ! -d "$BASE_PATH/$NAME" ] && [ ! -d "$BACKUP_DIR/$NAME" ]; then
              echo "$NAME"; return
            fi
            local RANDOM_SUFFIX=$(get_random_word)
            while [ -d "$BASE_PATH/${NAME}_${RANDOM_SUFFIX}" ] || [ -d "$BACKUP_DIR/${NAME}_${RANDOM_SUFFIX}" ]; do
              RANDOM_SUFFIX=$(get_random_word)
            done
            echo "${NAME}_${RANDOM_SUFFIX}"
          }

          # تابع دانلود با ۸ روش مختلف
          download_video() {
            local METHOD=$1
            local URL=$2
            local TMP_DIR=$3
            echo "Trying download method $METHOD..."

            if [ "$QUALITY" = "audio" ]; then
              COMMON_FLAGS="--extract-audio --audio-format mp3 --audio-quality 0 --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"
            else
              COMMON_FLAGS="--merge-output-format mp4 --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"
            fi

            case $METHOD in
              1)
                yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" "$URL"
                ;;
              2)
                yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:npm --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" "$URL"
                ;;
              3)
                yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web,mweb,android_vr" --js-runtimes deno --remote-components ejs:github "$URL"
                ;;
              4)
                yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=mweb" "$URL"
                ;;
              5)
                yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=android_vr" "$URL"
                ;;
              6)
                yt-dlp --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github "$URL"
                ;;
              7)
                yt-dlp --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=mweb" "$URL"
                ;;
              8)
                yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=android" --user-agent "Mozilla/5.0 (Linux; Android 12; SM-S906N Build/QP1A.190711.020) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36" "$URL"
                ;;
            esac
          }

          # ── حلقه اصلی برای هر لینک ──
          URL_INDEX=0
          for URL in "${URL_LIST[@]}"; do
            URL_INDEX=$((URL_INDEX + 1))
            
            echo ""
            echo "============================================================"
            echo "Processing URL $URL_INDEX / $TOTAL_URLS : $URL"
            echo "============================================================"

            TMP_DIR="tmp_downloads_${URL_INDEX}"
            mkdir -p "$TMP_DIR"

            DOWNLOAD_SUCCESS=false
            for METHOD in 1 2 3 4 5 6 7 8; do
              if download_video $METHOD "$URL" "$TMP_DIR"; then
                echo "✅ Download successful with method $METHOD!"

                # ── کیفیت سنجی: بررسی کنه ویدیو واقعاً با کیفیت درخواستی دانلود شده ──
                QUALITY_OK=true
                if [ "$QUALITY" != "best" ] && [ "$QUALITY" != "audio" ]; then
                  for DOWNLOADED_FILE in "$TMP_DIR"/*.mp4 "$TMP_DIR"/*.webm "$TMP_DIR"/*.mkv; do
                    [ -f "$DOWNLOADED_FILE" ] || continue
                    ACTUAL_HEIGHT=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of csv=p=0 "$DOWNLOADED_FILE" 2>/dev/null || echo "unknown")
                    echo "Requested quality: ${QUALITY}p | Actual video height: ${ACTUAL_HEIGHT}px"
                    if [ "$ACTUAL_HEIGHT" != "unknown" ] && [ "$ACTUAL_HEIGHT" -lt $(( QUALITY - 100 )) ] 2>/dev/null; then
                      echo "⚠️  Method $METHOD delivered ${ACTUAL_HEIGHT}p instead of ${QUALITY}p — rejecting and trying next method..."
                      QUALITY_OK=false
                      rm -f "$DOWNLOADED_FILE"
                      break
                    fi
                  done
                fi

                if [ "$QUALITY_OK" = true ]; then
                  DOWNLOAD_SUCCESS=true
                  break
                fi
              else
                echo "Method $METHOD failed, waiting 3 seconds..."
                sleep 3
              fi
            done

            if [ "$DOWNLOAD_SUCCESS" = false ]; then
              echo "❌ All download methods failed for URL: $URL — skipping."
              rm -rf "$TMP_DIR"
              continue
            fi

            find "$TMP_DIR" -name "*.part" -delete
            echo "✅ Download complete for URL $URL_INDEX"
            
            # ── پردازش فایل‌های دانلود شده ──
            for FILE in "$TMP_DIR"/*; do
              [ -f "$FILE" ] || continue
              if [[ "$FILE" == *.jpg ]] || [[ "$FILE" == *.webp ]]; then
                # ذخیره تامبنیل برای بعد
                continue
              fi

              SIZE=$(stat -c%s "$FILE")
              BASENAME=$(basename "$FILE")
              FILENAME_NO_EXT="${BASENAME%.*}"
              FILENAME_NO_EXT=$(sanitize_name "$FILENAME_NO_EXT")

              echo "Processing: $BASENAME ($(( SIZE / 1024 / 1024 ))MB)"

              FINAL_FOLDER_NAME=$(get_unique_folder "videos" "$FILENAME_NO_EXT")
              mkdir -p "$BACKUP_DIR/${FINAL_FOLDER_NAME}"

              # ذخیره تامبنیل
              THUMB_FILE=$(ls "$TMP_DIR"/*.jpg 2>/dev/null | head -1)
              if [ -n "$THUMB_FILE" ] && [ -f "$THUMB_FILE" ]; then
                cp "$THUMB_FILE" "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnail.jpg"
              fi

              echo "${FILENAME_NO_EXT}|${FINAL_FOLDER_NAME}" >> /tmp/video_info.txt

              # ── پارت بندی یا کپی مستقیم ──
              if [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
                echo "📦 Splitting $BASENAME into ${SPLIT_MB}MB parts..."

                ARCHIVE_BASE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}"

                if [ -n "$ZIP_PASSWORD" ]; then
                  7z a \
                    -tzip \
                    -v${SPLIT_MB}m \
                    -p"${ZIP_PASSWORD}" \
                    -mx=0 \
                    "${ARCHIVE_BASE}.zip" \
                    "$FILE"
                else
                  zip -0 -s ${SPLIT_MB}m "${ARCHIVE_BASE}.zip" "$FILE"
                fi

                PART_COUNT=$(ls "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.zip "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.z[0-9]* 2>/dev/null | wc -l)
                
                TOTAL_SIZE=0
                for part_file in "$BACKUP_DIR/${FINAL_FOLDER_NAME}"/*; do
                  [ -f "$part_file" ] && TOTAL_SIZE=$((TOTAL_SIZE + $(stat -c%s "$part_file")))
                done
                TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)

                # ساخت لینک‌های دانلود برای هر پارتیشن
                DOWNLOAD_LINKS_MD=""
                LINK_NUM=0
                GITHUB_REPO="${{ github.repository }}"
                GITHUB_BRANCH="${{ github.ref_name }}"
                
                for part_file in $(ls "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.zip "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.z[0-9]* 2>/dev/null | sort -V); do
                  if [ -f "$part_file" ]; then
                    PART_BASENAME=$(basename "$part_file")
                    PART_ENCODED=$(urlencode "$PART_BASENAME")
                    RAW_LINK="https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/downloads/${FINAL_FOLDER_NAME}/${PART_ENCODED}"
                    LINK_NUM=$((LINK_NUM + 1))
                    DOWNLOAD_LINKS_MD="${DOWNLOAD_LINKS_MD}| ${LINK_NUM} | \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |"$'\n'
                  fi
                done

                # ساخت فایل README برای ویدیوهای چند پارتی
                README_FILE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md"
                {
                  echo "# ${FILENAME_NO_EXT}"
                  echo ""
                  echo "---"
                  echo ""
                  echo "## Video Information"
                  echo ""
                  echo "| Property | Value |"
                  echo "|----------|-------|"
                  echo "| **Video Name** | \`${FILENAME_NO_EXT}\` |"
                  echo "| **Original Link** | [YouTube Video](${URL}) |"
                  echo "| **Total Parts** | **${PART_COUNT} parts** |"
                  echo "| **Total Size** | **${TOTAL_SIZE_MB} MB** |"
                  echo "| **Quality** | **${QUALITY}** |"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    echo "| **Password Protected** | **Yes** |"
                  else
                    echo "| **Password Protected** | **No** |"
                  fi
                  echo ""
                  echo "---"
                  echo ""
                  echo "## Download Links"
                  echo ""
                  echo "> ⬇️ Download all parts, then extract \`${FINAL_FOLDER_NAME}.zip\`"
                  echo ""
                  echo "| # | File | Link |"
                  echo "|---|------|------|"
                  echo "${DOWNLOAD_LINKS_MD}"
                  echo ""
                  echo "---"
                  echo ""
                  echo "*Downloaded with YouTube Advanced Downloader*"
                } > "$README_FILE"

                echo "✅ Created ${PART_COUNT} parts with README"

              else
                # فایل‌های کوچک - بدون پارتی بندی
                if [ -n "$ZIP_PASSWORD" ]; then
                  # با رمز
                  zip -j -P "${ZIP_PASSWORD}" \
                    "$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}.zip" \
                    "$FILE"
                  
                  SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                  GITHUB_REPO="${{ github.repository }}"
                  GITHUB_BRANCH="${{ github.ref_name }}"
                  RAW_LINK="https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/downloads/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}.zip"
                  
                  README_FILE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md"
                  {
                    echo "# ${FILENAME_NO_EXT}"
                    echo ""
                    echo "---"
                    echo "## Video Information"
                    echo "| Property | Value |"
                    echo "|----------|-------|"
                    echo "| **Video Name** | \`${FILENAME_NO_EXT}\` |"
                    echo "| **Original Link** | [YouTube Video](${URL}) |"
                    echo "| **Size** | **${SIZE_MB} MB** |"
                    echo "| **Quality** | **${QUALITY}** |"
                    echo "| **Password Protected** | **Yes** |"
                    echo ""
                    echo "## Download Link"
                    echo "[Download File](${RAW_LINK})"
                  } > "$README_FILE"
                else
                  # بدون رمز - مستقیم کپی
                  cp "$FILE" "$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}.mp4"
                  
                  SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                  GITHUB_REPO="${{ github.repository }}"
                  GITHUB_BRANCH="${{ github.ref_name }}"
                  RAW_LINK="https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/downloads/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}.mp4"
                  
                  README_FILE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md"
                  {
                    echo "# ${FILENAME_NO_EXT}"
                    echo ""
                    echo "---"
                    echo "## Video Information"
                    echo "| Property | Value |"
                    echo "|----------|-------|"
                    echo "| **Video Name** | \`${FILENAME_NO_EXT}\` |"
                    echo "| **Original Link** | [YouTube Video](${URL}) |"
                    echo "| **Size** | **${SIZE_MB} MB** |"
                    echo "| **Quality** | **${QUALITY}** |"
                    echo "| **Password Protected** | **No** |"
                    echo ""
                    echo "## Direct Download Link"
                    echo "[${FILENAME_NO_EXT}.mp4](${RAW_LINK})"
                  } > "$README_FILE"
                fi
                echo "✅ File processed (no split needed)"
              fi
            done
            rm -rf "$TMP_DIR"
          done

      - name: 📝 دانلود زیرنویس‌ها (فارسی و انگلیسی)
        if: ${{ github.event.inputs.download_subtitles == 'true' }}
        run: |
          # غیرفعال کردن خروجی خطا - خرابی زیرنویس نباید کل کار رو متوقف کنه
          set +e

          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          mapfile -t URL_LIST < /tmp/yt_urls.txt

          sub_download() {
            local MODE=$1
            local OUT="$2"
            local SURL="$3"
            local SUB_DIR
            SUB_DIR=$(dirname "$OUT")

            sub_count() { find "$SUB_DIR" -type f \( -name "*.vtt" -o -name "*.srt" \) 2>/dev/null | wc -l; }
            fa_count()  { find "$SUB_DIR" -type f \( -name "*.fa.vtt" -o -name "*.fa.srt" \) 2>/dev/null | wc -l; }
            en_count()  { find "$SUB_DIR" -type f \( -name "*.en.vtt" -o -name "*.en.srt" \) 2>/dev/null | wc -l; }

            sub_flags() {
              case $MODE in
                all)        echo "--write-sub --sub-langs fa,en" ;;
                fa-native)  echo "--write-sub --sub-langs fa" ;;
                fa-auto)    echo "--write-auto-sub --sub-langs fa" ;;
                en-auto)    echo "--write-auto-sub --sub-langs en" ;;
                auto-both)  echo "--write-auto-sub --sub-langs en,fa" ;;
              esac
            }
            
            SFLAGS=$(sub_flags)
            COMMON_SUB="--sub-format vtt/srt/best --convert-subs vtt --skip-download --no-playlist --no-check-certificates --output ${OUT}"

            for METHOD in 1 2 3 4 5 6 7 8; do
              echo "  [subtitle] Trying method $METHOD ..."
              case $METHOD in
                1)
                  yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true
                  ;;
                2)
                  yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:npm $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true
                  ;;
                3)
                  yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=web,mweb,android_vr" --js-runtimes deno --remote-components ejs:github $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true
                  ;;
                4)
                  yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=mweb" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true
                  ;;
                5)
                  yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=android_vr" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true
                  ;;
                6)
                  yt-dlp --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true
                  ;;
                7)
                  yt-dlp --extractor-args "youtube:player_client=mweb" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true
                  ;;
                8)
                  yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=android" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true
                  ;;
              esac

              if [ "$MODE" = "fa-native" ] || [ "$MODE" = "fa-auto" ]; then
                [ "$(fa_count)" -gt 0 ] && { echo "  [subtitle] ✅ Success with method $METHOD"; return 0; }
              elif [ "$MODE" = "en-auto" ]; then
                [ "$(en_count)" -gt 0 ] && { echo "  [subtitle] ✅ Success with method $METHOD"; return 0; }
              elif [ "$MODE" = "auto-both" ]; then
                local EN_GOT=$(en_count)
                local FA_GOT=$(fa_count)
                if [ "$EN_GOT" -gt 0 ] && [ "$FA_GOT" -gt 0 ]; then
                  echo "  [subtitle] ✅ Success with method $METHOD (both en+fa)"
                  return 0
                fi
              else
                [ "$(sub_count)" -gt 0 ] && { echo "  [subtitle] ✅ Success with method $METHOD"; return 0; }
              fi
              sleep 1
            done
            return 1
          }

          URL_INDEX=0
          while IFS='|' read -r ORIGINAL_NAME FOLDER_NAME; do
            URL_INDEX=$((URL_INDEX + 1))
            URL="${URL_LIST[$((URL_INDEX - 1))]}"
            [ -z "$FOLDER_NAME" ] && continue

            SUBTITLE_DIR="$BACKUP_DIR/${FOLDER_NAME}/subtitle"
            mkdir -p "$SUBTITLE_DIR"
            OUT_TMPL="${SUBTITLE_DIR}/%(title)s"

            echo ""
            echo "============================================================"
            echo "📝 Downloading subtitles for: $FOLDER_NAME"
            echo "============================================================"

            # اول زیرنویس اصلی رو امتحان کن
            sub_download "all" "$OUT_TMPL" "$URL" || true

            EN_COUNT=$(find "$SUBTITLE_DIR" -type f \( -name "*.en.vtt" -o -name "*.en.srt" \) 2>/dev/null | wc -l)
            FA_COUNT=$(find "$SUBTITLE_DIR" -type f \( -name "*.fa.vtt" -o -name "*.fa.srt" \) 2>/dev/null | wc -l)

            # اگه فارسی یا انگلیسی نبود، با auto-sub امتحان کن
            if [ "$EN_COUNT" -eq 0 ] || [ "$FA_COUNT" -eq 0 ]; then
              sub_download "auto-both" "$OUT_TMPL" "$URL" || true
            fi

            # اگه زیرنویسی دانلود شد، زیپش کن
            SUB_COUNT=$(find "$SUBTITLE_DIR" -type f 2>/dev/null | wc -l)
            if [ "$SUB_COUNT" -gt 0 ]; then
              ZIP_PATH="$BACKUP_DIR/${FOLDER_NAME}/subtitle.zip"
              (cd "$SUBTITLE_DIR" && zip -j "$ZIP_PATH" ./* 2>&1) && rm -rf "$SUBTITLE_DIR"
              echo "✅ Subtitles zipped: subtitle.zip"
            else
              rmdir "$SUBTITLE_DIR" 2>/dev/null || true
            fi
          done < /tmp/video_info.txt

          set -e
          echo "✅ Subtitle step completed"

      - name: 🧹 پاکسازی و آماده‌سازی نهایی
        run: |
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          
          # ایجاد پوشه نهایی با ساختار مناسب
          mkdir -p final_artifacts
          
          # کپی همه فایل‌ها به پوشه نهایی
          if [ -d "$BACKUP_DIR" ]; then
            for folder in "$BACKUP_DIR"/*/; do
              if [ -d "$folder" ]; then
                folder_name=$(basename "$folder")
                mkdir -p "final_artifacts/$folder_name"
                cp -r "$folder"* "final_artifacts/$folder_name/"
              fi
            done
          fi
          
          # درست کردن یک فهرست اصلی از همه ویدیوها
          {
            echo "# 📥 Downloaded Videos"
            echo ""
            echo "These files were downloaded using YouTube Advanced Downloader"
            echo ""
            echo "## Video List:"
            echo ""
            
            for folder in final_artifacts/*/; do
              if [ -f "$folder/README.md" ]; then
                folder_name=$(basename "$folder")
                echo "- **$folder_name** - [View README]($folder_name/README.md)"
              fi
            done
          } > final_artifacts/INDEX.md
          
          echo "✅ Files ready for upload"
          ls -la final_artifacts/

      - name: 📤 آپلود به عنوان Artifact (امن و قانونی)
        uses: actions/upload-artifact@v4
        with:
          name: youtube-downloads-${{ github.run_id }}
          path: final_artifacts/
          retention-days: 30  # فایل‌ها به مدت 30 روز در گیت‌هاب نگهداری می‌شن
          compression-level: 0  # بدون فشرده‌سازی اضافی

      - name: 🎉 اتمام کار - نمایش لینک دانلود
        if: always()
        run: |
          echo "=========================================="
          echo "✅ Download completed successfully!"
          echo "=========================================="
          echo ""
          echo "📥 To download your files:"
          echo "   1. Go to the 'Actions' tab in your repository"
          echo "   2. Click on this workflow run"
          echo "   3. Scroll down to the 'Artifacts' section"
          echo "   4. Click on 'youtube-downloads-XXXX'"
          echo ""
          echo "⏰ These files will be available for 30 days"
          echo "=========================================="

      - name: 🛑 توقف کانتینر WARP
        if: always()
        run: |
          docker stop warp || true
          docker rm warp || true
